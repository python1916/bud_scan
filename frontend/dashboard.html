<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bug Analyzer — Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="dashboard-shell">
      <header class="header dashboard-header">
        <a class="brand" href="index.html">Bug Analyzer</a>
        <div class="dashboard-actions">
          <span id="proStatus" class="pro-status"></span>
          <button id="upgradeButton" class="button button-tertiary" style="display: none;">Upgrade</button>
          <button id="logoutButton" class="button button-secondary">Logout</button>
        </div>
      </header>
      <main class="dashboard-main">
        <section class="dashboard-panel">
          <div class="dashboard-top">
            <div>
              <p class="eyebrow">Bug Analyzer</p>
              <h1>Paste code and review the analysis.</h1>
              <p>Use the analyzer to find bugs, syntax issues, and improvement suggestions.</p>
            </div>
          </div>

          <div class="analyzer-card">
            <label for="codeInput">Code input</label>
            <textarea id="codeInput" rows="12" placeholder="Paste JavaScript code here..."></textarea>

            <div class="analyze-actions">
              <input type="file" id="fileInput" accept=".js,.ts,.py,.java,.txt" />
              <button id="analyzeButton" class="button button-primary">Analyze</button>
            </div>
            <div id="analyzeError" class="form-error"></div>
          </div>

          <div class="stats-card">
            <div class="stat">
              <span>Plan</span>
              <strong id="plan">Loading...</strong>
            </div>
            <div class="stat">
              <span>Scans used</span>
              <strong id="scans">0</strong>
            </div>
          </div>

          <section class="results-card">
            <div class="results-header">
              <h2>Analysis results</h2>
              <p id="resultsSummary">Submit code to see bug findings.</p>
            </div>
            <ul id="resultsList" class="result-grid"></ul>
          </section>
        </section>
      </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/analyze.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
